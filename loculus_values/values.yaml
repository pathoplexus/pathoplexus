        generateIndex: true
        autocomplete: true
        hideOnSequenceDetailsPage: true
        noInput: true
        header: "INSDC"
        orderOnDetailsPage: 980
      - name: insdcAccessionBase
        displayName: INSDC accession base
        definition: The base accession assigned by the INSDC (GenBank/ENA/DDBJ) for this sequence, without the version number.
        header: "INSDC"
        orderOnDetailsPage: 940
        hideOnSequenceDetailsPage: true
        noInput: true
        perSegment: true
        oneHeader: true
      - name: insdcVersion
        displayName: INSDC version
        definition: The version number of the INSDC record, incremented each time the sequence record is updated.
        type: int
        header: "INSDC"
        orderOnDetailsPage: 960
        hideOnSequenceDetailsPage: true
        noInput: true
        perSegment: true
        oneHeader: true
      - name: insdcAccessionFull
        displayName: INSDC accession
        definition: The full versioned INSDC accession (base accession plus version number), searchable across GenBank, ENA, and DDBJ.
        includeInDownloadsByDefault: true
        customDisplay:
          type: linkWithMenu
          linkMenuItems:
            - name: View in NCBI
              url: "https://www.ncbi.nlm.nih.gov/nuccore/__value__"
            - name: View in ENA
              url: "https://www.ebi.ac.uk/ena/browser/view/__value__"
            - name: View in DDBJ
              url: "https://getentry.ddbj.nig.ac.jp/getentry/na/__value__"
        header: "INSDC"
        ingest: genbankAccession
        noInput: true
        perSegment: true
        oneHeader: true
        orderOnDetailsPage: 920
      - name: bioprojectAccession
        displayName: BioProject accession
        customDisplay:
          type: linkWithMenu
          linkMenuItems:
            - name: View in NCBI
              url: "https://www.ncbi.nlm.nih.gov/bioproject/__value__"
            - name: View in ENA
              url: "https://www.ebi.ac.uk/ena/browser/view/__value__"
            - name: View in DDBJ
              url: "https://ddbj.nig.ac.jp/search/entry/bioproject/__value__"
        header: "INSDC"
        orderOnDetailsPage: 930
        ingest: bioprojects
        guidance: "Only add this field if you want your sequences to be deposited into an existing public BioProject in the INSDC. If you do not have a bioproject, leave this field blank - we will create a BioProject for you on submission of your consensus sequence."
        definition: "Accession of public BioProject in the INSDC your consensus sequences should be uploaded to."
        example: "PRJNA123456"
        preprocessing:
          function: check_regex
          inputs:
            regex_field: bioprojectAccession
          args:
            pattern: "^PRJ(E|D|N)[A-Z][0-9]+$"
      - name: biosampleAccession
        displayName: BioSample accession
        customDisplay:
          type: linkWithMenu
          linkMenuItems:
            - name: View in NCBI
              url: "https://www.ncbi.nlm.nih.gov/biosample/__value__"
            - name: View in ENA
              url: "https://www.ebi.ac.uk/ena/browser/view/__value__"
            - name: View in DDBJ
              url: "https://ddbj.nig.ac.jp/search/entry/biosample/__value__"
        header: "INSDC"
        orderOnDetailsPage: 935
        includeInDownloadsByDefault: true
        guidance: "Only add this field if you have already submitted raw reads for this sequence to the INSDC, read more at https://pathoplexus.org/docs/how-to/upload-sequences. If you add this field we will not create a new BioSample for you and assume you have submitted all required metadata in the linked BioSample. If you add this field, you should also add the corresponding BioProject."
        definition: "Accession of corresponding public BioSample of the raw reads in the INSDC."
        example: "SAMN12345678"
        oneHeader: true
        preprocessing:
          function: check_regex
          inputs:
            regex_field: biosampleAccession
          args:
            pattern: "^SAM(E|D|N)[A-Z]?[0-9]+$"
      - name: gcaAccession
        displayName: GCA accession
        definition: The GenBank genome assembly accession number for the sequence.
        customDisplay:
          type: link
