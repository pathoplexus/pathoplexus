      - name: diagnosticMeasurementUnit
        displayName: Diagnostic measurement - unit
        header: Diagnostics
        orderOnDetailsPage: 2600
        definition: "Unit of the diagnostic measurement value."
        example: "Cycle threshold (CT)"
      - name: length
