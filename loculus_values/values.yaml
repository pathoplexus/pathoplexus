        example: "E gene (orf4)"
      - name: diagnosticMeasurementValue
        displayName: Diagnostic measurement - value
        header: Diagnostics
        orderOnDetailsPage: 2580
        definition: "Value of the diagnostic test. Ex: The Ct value result from a diagnostic SARS-CoV-2 RT-PCR test."
