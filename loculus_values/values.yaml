      - name: passageMethod
        displayName: Passage method
        generateIndex: true
        autocomplete: true
        header: "Host"
        orderOnDetailsPage: 1980
        definition: "The techniques used to subculture cells."
        example: "Enzymatic Detachment"
      - name: ncbiSourceDb
        displayName: NCBI Source DB
        definition: Indicates if the source of the viral nucleotide record is from a GenBank submitter or from NCBI-derived curation (RefSeq).
        generateIndex: true
        autocomplete: true
        header: "INSDC"
        orderOnDetailsPage: 1140
        hideOnSequenceDetailsPage: true
        noInput: true
      - name: ncbiVirusName
        displayName: NCBI Virus name
        definition: Scientific name for the organism from the NCBI Taxonomy.
        generateIndex: true
        autocomplete: true
        hideOnSequenceDetailsPage: true
        noInput: true
        header: "INSDC"
        orderOnDetailsPage: 1160
      - name: ncbiVirusTaxId
        displayName: NCBI Virus tax ID
        definition: Taxon ID for the organism from the NCBI Taxonomy.
        type: int
        autocomplete: true
        customDisplay:
          type: link
          url: "https://www.ncbi.nlm.nih.gov/labs/virus/vssi/#/virus?SeqType_s=Nucleotide&VirusLineage_ss=taxid:__value__"
        hideOnSequenceDetailsPage: true
        noInput: true
        header: "INSDC"
        orderOnDetailsPage: 1180
      - name: insdcRawReadsAccession
        displayName: Raw reads accession
        customDisplay:
          type: link
          url: "https://www.ncbi.nlm.nih.gov/sra/?term=__value__"
        header: "INSDC"
        orderOnDetailsPage: 1120
        includeInDownloadsByDefault: true
        ingest: ncbiSraAccessions
        guidance: "Only add this field if you have already submitted raw reads to the INSDC, read more at https://pathoplexus.org/docs/how-to/upload-sequences."
        definition: "Accession of corresponding raw reads in the INSDC, e.g. SRR27477368."
        preprocessing:
          function: check_regex
          inputs:
            regex_field: insdcRawReadsAccession
          args:
            # NCBI can output comma-separated lists of SRR accessions
            # Also accept ERS/SRS for now, as NCBI virus occasionally sends those
            # See https://github.com/ncbi/datasets/issues/516
            pattern: "^(E|D|S)R(R|S)[0-9]{6,}(,(E|D|S)R(R|S)[0-9]{6,})*$"
      - name: totalSnps
        type: int
        definition: "Total count of nucleotide substitutions."
        isSequenceFilter: true
        header: "Alignment and QC metrics"
        orderOnDetailsPage: 2720
        noInput: true
        rangeSearch: true
        perSegment: true
        displayName: '# of SNPs'
        preprocessing:
          inputs: {input: nextclade.totalSubstitutions}
      - name: totalInsertedNucs
        type: int
        definition: "Total count of inserted nucleotide positions."
        isSequenceFilter: true
        header: "Alignment and QC metrics"
        orderOnDetailsPage: 2740
        noInput: true
        rangeSearch: true
        perSegment: true
        displayName: '# of inserted bases'
        preprocessing:
          inputs: {input: nextclade.totalInsertions}
      - name: totalDeletedNucs
        type: int
        definition: "Total count of deleted nucleotide positions."
        isSequenceFilter: true
        header: "Alignment and QC metrics"
        orderOnDetailsPage: 2760
        noInput: true
        rangeSearch: true
        perSegment: true
        preprocessing:
          inputs: {input: nextclade.totalDeletions}
        displayName: '# of deleted bases'
      - name: totalAmbiguousNucs
        type: int
        definition: "Total count of ambiguous nucleotides (not A, C, G, T, or N)."
        isSequenceFilter: true
        header: "Alignment and QC metrics"
        orderOnDetailsPage: 2780
        includeInDownloadsByDefault: true
        noInput: true
        rangeSearch: true
        perSegment: true
        displayName: '# of ambiguous bases'
        preprocessing:
          inputs: {input: "nextclade.totalNonACGTNs"}
      - name: totalUnknownNucs
        type: int
        definition: "Total count of missing (N) nucleotides."
        isSequenceFilter: true
        header: "Alignment and QC metrics"
        orderOnDetailsPage: 2800
        includeInDownloadsByDefault: true
        noInput: true
        rangeSearch: true
        perSegment: true
        displayName: '# of unknown bases'
        preprocessing:
          inputs: {input: nextclade.totalMissing}
      - name: totalFrameShifts
        type: int
        definition: "Total count of detected frame shifts."
        isSequenceFilter: true
        rangeSearch: true
        header: "Alignment and QC metrics"
        orderOnDetailsPage: 2820
        noInput: true
        perSegment: true
        displayName: '# of frame shifts'
        preprocessing:
          inputs: {input: nextclade.totalFrameShifts}
      - name: frameShifts
        definition: "Frame-shifting insertions or deletions detected in CDS regions."
        header: "Alignment and QC metrics"
        isSequenceFilter: true
        orderOnDetailsPage: 2840
        noInput: true
        perSegment: true
        displayName: Frame shifts
        preprocessing:
          inputs: {input: nextclade.frameShifts}
      - name: completeness
        type: float
        definition: "Fraction of reference positions covered by the sequence (0.0 to 1.0)."
        isSequenceFilter: true
        header: "Alignment and QC metrics"
        orderOnDetailsPage: 2720
        includeInDownloadsByDefault: true
        noInput: true
        perSegment: true
        displayName: Completeness
        rangeSearch: true
        percentage: true
        customDisplay:
          type: lengthCompleteness
          displayGroup: lengthCompleteness
          label: Length
        preprocessing:
          inputs: {input: nextclade.coverage}
      - name: comment
        displayName: Comment
        header: "Submission details"
        orderOnDetailsPage: 2900
        definition: "Any additional comments about the sample or sequence."
      - name: totalStopCodons
        displayName: '# of stop codons'
        definition: "Number of penalized premature stop codons."
        type: int
        isSequenceFilter: true
        header: "Alignment and QC metrics"
        orderOnDetailsPage: 2830
        noInput: true
        perSegment: true
        preprocessing:
          inputs: {input: nextclade.qc.stopCodons.totalStopCodons}
      - name: stopCodons
        displayName: Stop Codons
        definition: "Premature stop codons not in the ignored list (penalized)."
        isSequenceFilter: true
        header: "Alignment and QC metrics"
        orderOnDetailsPage: 2840
        noInput: true
        perSegment: true
        preprocessing:
          inputs: {input: nextclade.qc.stopCodons.stopCodons}
    website: &website
      tableColumns:
        - sampleCollectionDate
        - earliestReleaseDate
        - authors
        - authorAffiliations
        - geoLocCountry
        - geoLocAdmin1
        - length
      defaultOrderBy: sampleCollectionDate
      defaultOrder: descending
      multiFieldSearches:
        - name: identifier
          displayName: Identifier (INSDC, etc.)
          orderInSearchDisplay: -10000
          fields:
            - accessionVersion
            - submissionId
            - insdcAccessionFull
            - bioprojectAccession
            - gcaAccession
            - biosampleAccession
            - insdcRawReadsAccession
    extraInputFields:
      - &hostConfig
        name: host
        type: string
        displayName: "Host"
        definition: "NCBI taxon ID or scientific name that uniquely identifies the host from which the sample was collected."
        guidance: "You can provide either the scientific name of the organism (e.g., `Aedes aegypti`) or its NCBI taxon ID (e.g., `7159`) in this field. We will validate your input and use it to populate the `hostNameCommon` and `hostNameScientific` fields. When uploading data from a pooled sample, we recommend using a higher-level taxon that includes all host organisms in the sample pool. For example, you can use `Culicidae` when uploading data for a pooled mosquito sample (in addition to setting the `specimenProcessing` field to `Samples pooled`, see [OBI:0600016])."
        example: "Aedes aegypti"
        hideInSearchResultsTable: true
        hideOnSequenceDetailsPage: true
        desired: true
        position: last
    metadataTemplate:
      - geoLocCountry
      - sampleCollectionDate
      - authors
      - authorAffiliations
      - host
      - collectionDevice
      - collectionMethod
      - cultureId
      - depthOfCoverage
      - geoLocAdmin1
      - geoLocAdmin2
      - sampleReceivedDate
      - sequencingDate
      - sequencingInstrument
      - sequencingProtocol
      - specimenCollectorSampleId
      - versionComment
      - comment
  preprocessing:
    - &preprocessing
      replicas: 1
      image: ghcr.io/loculus-project/preprocessing-nextclade
      args:
        - "prepro"
      configFile: &preprocessingConfigFile
        log_level: DEBUG
        batch_size: 100
        backend_request_timeout_seconds: 600
  ingest: &ingest
    image: ghcr.io/loculus-project/ingest
    configFile: &defaultIngestConfigFile
      time_between_approve_requests_seconds: 600
