          definition: "Clade label assigned by Nextclade, for views on the datasets see https://nextstrain.org/fetch/data.clades.nextstrain.org/v3/community/v-gen-lab/dengue/denv1/2025-09-09--12-13-13Z/tree.json for DENV-1, https://nextstrain.org/fetch/data.clades.nextstrain.org/v3/community/v-gen-lab/dengue/denv2/2025-09-09--12-13-13Z/tree.json for DENV-2, https://nextstrain.org/fetch/data.clades.nextstrain.org/v3/community/v-gen-lab/dengue/denv3/2025-09-09--12-13-13Z/tree.json for DENV-3 and https://nextstrain.org/fetch/data.clades.nextstrain.org/v3/community/v-gen-lab/dengue/denv4/2025-09-09--12-13-13Z/tree.json for DENV-4."
          header: "Lineage & Serotype"
          lineageSystem: dengue
          isSequenceFilter: true
          noInput: true
          generateIndex: true
          autocomplete: true
          initiallyVisible: true
          includeInDownloadsByDefault: true
          preprocessing:
            inputs: {input: nextclade.clade}
          order: 5
          columnWidth: 80
          orderOnDetailsPage: 740
        - name: specimenCollectorSampleId
          displayName: Isolate name
          header: Sample details
          orderOnDetailsPage: 600
          ingest: ncbiIsolateName
          includeInDownloadsByDefault: true
          enableSubstringSearch: true
          definition: "A de-identified ID for the sample the sequence was obtained from. Depending on its format, this ID may be parsed and incorporated in the display name of this sequence on the website."
          example: "Isolate 1"
          desired: true
        # custom displayName construction for Dengue
        - name: displayName
          displayName: Display name
          definition: A human-readable label for the sequence record, with the format `{serotype}/{geoLocCountry}/{identifier}/{sampleCollectionDate}`. The identifier is provided from `specimenCollectorSampleId` if set, otherwise `submissionId`. For sequences ingested from the INSDC, the identifier is taken directly as the provided field, assuming it contains no slashes or spaces, otherwise the `accessionVersion` is used. For other sequences, if the provided field has a display-name format itself (four items, separated by three slashes), then the identifier is extracted as the second to last item within this. If the identifier cannot be extracted (due to invalid format of the provided field), the `accessionVersion` is used. Missing `geoLocCountry`/`sampleCollectionDate` default to `unknown`.
          noInput: true
          preprocessing:
            function: build_display_name
            inputs:
              serotype: ASSIGNED_REFERENCE
              geoLocCountry: geoLocCountry
              sampleCollectionDate: processed.sampleCollectionDate
              specimenCollectorSampleId: specimenCollectorSampleId
              submissionId: submissionId
            args:
              order: [serotype, geoLocCountry, IDENTIFIER, sampleCollectionDate]
              type: [string, string, IDENTIFIER, dateRangeString]
              # regex pattern constraints:
              # - Cannot start with a slash
              # - Four fields, separated by exactly three slashes
              # - Last field is a date in format YYYY, YYYY-MM, or YYYY-MM-DD
              # - Identifier is the second to last field (extracted through named capture group)
              regex_pattern: '^[^/][^/]*/[^/]+/(?P<identifier>[^/]+)/\d{4}(?:-\d{2}){0,2}$'
        - name: serotype
          displayName: Serotype
          definition: "Which of the antigenically distinct types of dengue virus the sequence was most closely assigned to according to Nextclade."
          header: "Lineage & Serotype"
          noInput: true
          generateIndex: true
          autocomplete: true
          preprocessing:
            inputs: { input: ASSIGNED_REFERENCE }
      website:
