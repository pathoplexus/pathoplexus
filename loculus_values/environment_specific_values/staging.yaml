runDevelopmentMainDatabase: false
runDevelopmentKeycloakDatabase: false
readOnlyMode: true
accessionPrefix: "PP_"
bannerMessage: "This is a staging instance. You should not use it for analysis as it may contain inaccurate test data."
bannerMessageURL: "https://pathoplexus.github.io/announcement_banners/staging/banner.txt"
submissionBannerMessage: ""
submissionBannerMessageURL: "https://pathoplexus.github.io/announcement_banners/staging/submissionbanner.txt"
secrets:
  basicauth:
    type: sealedsecret
    clusterWide: true
    encryptedData:
      users: 
  keycloak-admin:
    type: sealedsecret
    clusterWide: "true"
    encryptedData:
      initialAdminPassword: ""
  service-accounts:
    type: sealedsecret
    clusterWide: "true"
    encryptedData:
      backendUserPassword: 
      externalMetadataUpdaterPassword: 
      insdcIngestUserPassword: 
      preprocessingPipelinePassword: 
  database:
    type: sealedsecret
    clusterWide: "true"
    encryptedData:
      host: 
      password: 
      url: 
      username: 
  keycloak-database:
    type: sealedsecret
    clusterWide: "true"
    encryptedData:
      addr: 
      database: 
      password: 
      port: 
      username: 
  ena-submission:
    type: sealedsecret
    clusterWide: "true"
    encryptedData:
      username: 
      password: 
  slack-notifications:
    type: sealedsecret
    clusterWide: "true"
    encryptedData:
      # Token for #testing-notifications channel
      slack-hook: 
      # Channel: #testing-notifications
      slack-channel-id: 
      slack-token: 
podPriorityClassName: staging
disableEnaSubmission: false
enaDeposition: 
  submitToEnaProduction: false
  enaDbName: Pathoplexus
  enaUniqueSuffix: Pathoplexus
  enaIsBroker: True
  enaSuppressedListTestUrl: "https://pathoplexus.github.io/ena-submission/suppressed/ppx-accessions-suppression-list.txt"
seqSets:
  enabled: True
  crossRef: null
sequenceFlagging:
  github:
    issueTemplate: sequence-metadata-issue.md
defaultResources:
  requests:
    memory: "200Mi"
    cpu: "20m"
  limits:
    memory: "1Gi"
    cpu: "1000m"
siloImport:
  pollIntervalSeconds: 60